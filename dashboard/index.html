
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horry County Motivated Seller Leads</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px;
  background: #f5f5f5;
  color: #1a1a1a;
}

/* ── TOP BAR ── */
.topbar {
  background: #1e3a8a;
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-sub { font-size: 11px; opacity: .7; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.updated { font-size: 11px; opacity: .8; }
.btn-export {
  background: white;
  color: #1e3a8a;
  border: none;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}
.btn-export:hover { background: #e0e7ff; }

/* ── STATS ── */
.stats {
  display: flex;
  background: white;
  border-bottom: 1px solid #ddd;
  overflow-x: auto;
}
.stat {
  flex: 1;
  min-width: 100px;
  padding: 14px 16px;
  border-right: 1px solid #eee;
  text-align: center;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #888;
  margin-bottom: 4px;
}
.stat-value {
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
}
.blue { color: #1e3a8a; }
.green { color: #059669; }
.amber { color: #d97706; }
.red { color: #dc2626; }
.black { color: #111; }

/* ── BODY LAYOUT ── */
.body-layout {
  display: flex;
  min-height: calc(100vh - 140px);
}

/* ── SIDEBAR ── */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 16px 12px;
  overflow-y: auto;
}
.sidebar-section { margin-bottom: 20px; }
.sidebar-heading {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #999;
  margin-bottom: 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid #eee;
}
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 6px 8px;
  margin-bottom: 2px;
  background: none;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  color: #555;
  text-align: left;
}
.filter-btn:hover { background: #f0f4ff; color: #1e3a8a; }
.filter-btn.active { background: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; font-weight: 600; }
.filter-btn span.cnt {
  background: #f0f0f0;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
  color: #888;
  flex-shrink: 0;
  margin-left: 4px;
}
.filter-btn.active span.cnt { background: #dbeafe; color: #1e3a8a; }
.filter-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── MAIN CONTENT ── */
.main-content { flex: 1; overflow: hidden; }

/* ── SEARCH BAR ── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: white;
  border-bottom: 1px solid #ddd;
}
.search-bar input {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
  outline: none;
}
.search-bar input:focus { border-color: #1e3a8a; }
.search-bar select {
  padding: 7px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 12px;
  outline: none;
  background: white;
}
.rec-count { font-size: 11px; color: #888; white-space: nowrap; }

/* ── TABLE WRAPPER ── */
.table-wrapper { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 800px;
}

/* HEADER ROW - NOT STICKY */
table thead tr {
  background: #f0f0f0;
  border-bottom: 2px solid #ccc;
}
table thead th {
  padding: 9px 12px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #666;
  white-space: nowrap;
}

/* DATA ROWS */
table tbody tr {
  border-bottom: 1px solid #eee;
  background: white;
  cursor: pointer;
}
table tbody tr:hover { background: #f0f4ff; }
table tbody tr:nth-child(even) { background: #fafafa; }
table tbody tr:nth-child(even):hover { background: #f0f4ff; }

table td {
  padding: 9px 12px;
  vertical-align: middle;
}

/* ── SCORE BADGE ── */
.score {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 24px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid;
}
.score-hi { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.score-md { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
.score-lo { background: #f3f4f6; color: #6b7280; border-color: #d1d5db; }

/* ── TYPE BADGE ── */
.type-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  border: 1px solid;
  white-space: nowrap;
}
.t-LP     { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
.t-NOFC   { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
.t-TAXDEED{ background: #fef9c3; color: #854d0e; border-color: #fde047; }
.t-JUD    { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
.t-LN     { background: #e0f2fe; color: #0c4a6e; border-color: #7dd3fc; }
.t-PRO    { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
.t-NOC    { background: #d1fae5; color: #064e3b; border-color: #6ee7b7; }
.t-RELLP  { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
.t-MISC   { background: #f9fafb; color: #6b7280; border-color: #e5e7eb; }

/* ── FLAG CHIPS ── */
.flags { display: flex; flex-wrap: wrap; gap: 3px; }
.flag {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 3px;
  background: #e0f2fe;
  color: #0369a1;
  border: 1px solid #bae6fd;
  white-space: nowrap;
}
.flag.hot { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

/* ── AMOUNT ── */
.amt { font-weight: 600; color: #d97706; font-size: 12px; white-space: nowrap; }
.amt.big { color: #dc2626; }

/* ── VIEW LINK ── */
a.view-link {
  color: #1e3a8a;
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
a.view-link:hover { text-decoration: underline; }

/* ── EMPTY STATE ── */
.empty {
  padding: 60px;
  text-align: center;
  color: #999;
}
.empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #555; }

/* ── MODAL ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: white;
  border-radius: 8px;
  width: min(640px, 94vw);
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close {
  background: #f0f0f0;
  border: none;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
}
.modal-close:hover { background: #e0e0e0; }
.modal-body {
  padding: 18px 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 24px;
}
.modal-field { display: flex; flex-direction: column; gap: 3px; }
.modal-field.full { grid-column: 1 / -1; }
.modal-field label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: #999;
}
.modal-field .val { font-size: 14px; color: #1a1a1a; word-break: break-word; }
.modal-field .val.mono { font-family: monospace; font-size: 12px; }
.score-bar { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
.score-bar-bg { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; }
.modal-foot {
  padding: 14px 22px;
  border-top: 1px solid #eee;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: #fafafa;
  border-radius: 0 0 8px 8px;
}
.btn-sec {
  padding: 8px 14px;
  border: 1px solid #ccc;
  background: white;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: #333;
}
.btn-sec:hover { border-color: #1e3a8a; color: #1e3a8a; background: #eff6ff; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">🏚 Horry County Leads</div>
    <div class="topbar-sub">MOTIVATED SELLER INTELLIGENCE</div>
  </div>
  <div class="topbar-right">
    <span class="updated" id="updated">Loading…</span>
    <button class="btn-export" onclick="exportCSV()">⬇ Export GHL CSV</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-label">Total Leads</div><div class="stat-value blue" id="sTotal">—</div></div>
  <div class="stat"><div class="stat-label">With Address</div><div class="stat-value green" id="sAddr">—</div></div>
  <div class="stat"><div class="stat-label">High Score 70+</div><div class="stat-value amber" id="sHigh">—</div></div>
  <div class="stat"><div class="stat-label">Pre-Foreclosure</div><div class="stat-value red" id="sFC">—</div></div>
  <div class="stat"><div class="stat-label">Lis Pendens</div><div class="stat-value red" id="sLP">—</div></div>
  <div class="stat"><div class="stat-label">Judgments</div><div class="stat-value black" id="sJUD">—</div></div>
  <div class="stat"><div class="stat-label">Liens</div><div class="stat-value black" id="sLN">—</div></div>
  <div class="stat"><div class="stat-label">Avg Score</div><div class="stat-value blue" id="sAvg">—</div></div>
</div>

<!-- BODY -->
<div class="body-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-heading">Lead Type</div>
      <div id="typeFilters"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading">Score</div>
      <button class="filter-btn active" data-score="all" onclick="setScore(this,'all')"><span class="filter-label">All Scores</span></button>
      <button class="filter-btn" data-score="high" onclick="setScore(this,'high')"><span class="filter-label">🔥 High 70–100</span></button>
      <button class="filter-btn" data-score="mid" onclick="setScore(this,'mid')"><span class="filter-label">⚡ Mid 50–69</span></button>
      <button class="filter-btn" data-score="low" onclick="setScore(this,'low')"><span class="filter-label">◌ Low &lt;50</span></button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading">Flags</div>
      <button class="filter-btn active" data-flag="all" onclick="setFlag(this,'all')"><span class="filter-label">All Flags</span></button>
      <button class="filter-btn" data-flag="Lis pendens" onclick="setFlag(this,'Lis pendens')"><span class="filter-label">Lis Pendens</span></button>
      <button class="filter-btn" data-flag="Pre-foreclosure" onclick="setFlag(this,'Pre-foreclosure')"><span class="filter-label">Pre-Foreclosure</span></button>
      <button class="filter-btn" data-flag="Judgment lien" onclick="setFlag(this,'Judgment lien')"><span class="filter-label">Judgment Lien</span></button>
      <button class="filter-btn" data-flag="Tax lien" onclick="setFlag(this,'Tax lien')"><span class="filter-label">Tax Lien</span></button>
      <button class="filter-btn" data-flag="Mechanic lien" onclick="setFlag(this,'Mechanic lien')"><span class="filter-label">Mechanic Lien</span></button>
      <button class="filter-btn" data-flag="HOA lien" onclick="setFlag(this,'HOA lien')"><span class="filter-label">HOA / Condo Lien</span></button>
      <button class="filter-btn" data-flag="Probate / estate" onclick="setFlag(this,'Probate / estate')"><span class="filter-label">Probate / Estate</span></button>
      <button class="filter-btn" data-flag="LLC / corp owner" onclick="setFlag(this,'LLC / corp owner')"><span class="filter-label">LLC / Corp Owner</span></button>
      <button class="filter-btn" data-flag="New this week" onclick="setFlag(this,'New this week')"><span class="filter-label">New This Week</span></button>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- SEARCH BAR -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search owner, document number, legal description…" oninput="applyFilters()">
      <select id="sortSel" onchange="applyFilters()">
        <option value="score_desc">Score — High to Low</option>
        <option value="score_asc">Score — Low to High</option>
        <option value="date_desc">Date — Newest First</option>
        <option value="date_asc">Date — Oldest First</option>
        <option value="amount_desc">Amount — Largest First</option>
        <option value="owner_asc">Owner — A to Z</option>
      </select>
      <span class="rec-count" id="recCount"></span>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <div id="tableArea"><div class="empty"><div class="empty-title">Loading leads…</div></div></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="mTitle">—</div>
        <div id="mBadge" style="margin-top:6px"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<script>
let ALL = [], filtered = [];
let activeType = 'all', activeScore = 'all', activeFlag = 'all';

const CAT_LABELS = {
  LP:'Lis Pendens', NOFC:'Notice of Foreclosure', TAXDEED:'Tax Deed',
  JUD:'Judgment', LN:'Lien', PRO:'Probate', NOC:'Notice of Comm.', RELLP:'Release LP'
};
const TYPE_ORDER = ['LP','NOFC','TAXDEED','JUD','LN','PRO','NOC','RELLP'];

async function loadData() {
  try {
    const r = await fetch('records.json?v=' + Date.now());
    const d = await r.json();
    if (d.fetched_at) {
      const dt = new Date(d.fetched_at);
      document.getElementById('updated').textContent =
        'Updated ' + dt.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    ALL = (d.records||[]).map((r,i) => ({...r, _id:i}));
    updateStats();
    buildTypeFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('tableArea').innerHTML =
      `<div class="empty"><div class="empty-title">Could not load records.json</div><div style="color:#999;margin-top:6px;font-size:12px">${e.message}</div></div>`;
  }
}

function updateStats() {
  document.getElementById('sTotal').textContent = ALL.length;
  document.getElementById('sAddr').textContent  = ALL.filter(r=>r.prop_address).length;
  document.getElementById('sHigh').textContent  = ALL.filter(r=>r.score>=70).length;
  document.getElementById('sFC').textContent    = ALL.filter(r=>r.cat==='NOFC').length;
  document.getElementById('sLP').textContent    = ALL.filter(r=>r.cat==='LP').length;
  document.getElementById('sJUD').textContent   = ALL.filter(r=>r.cat==='JUD').length;
  document.getElementById('sLN').textContent    = ALL.filter(r=>r.cat==='LN').length;
  const avg = ALL.length ? Math.round(ALL.reduce((s,r)=>s+(r.score||0),0)/ALL.length) : 0;
  document.getElementById('sAvg').textContent   = avg;
}

function buildTypeFilters() {
  const counts = {};
  ALL.forEach(r => { counts[r.cat] = (counts[r.cat]||0)+1; });
  let html = `<button class="filter-btn active" data-cat="all" onclick="setType(this,'all')">
    <span class="filter-label">All Types</span><span class="cnt">${ALL.length}</span></button>`;
  TYPE_ORDER.filter(c=>counts[c]).forEach(c => {
    html += `<button class="filter-btn" data-cat="${c}" onclick="setType(this,'${c}')">
      <span class="filter-label">${CAT_LABELS[c]||c}</span><span class="cnt">${counts[c]}</span></button>`;
  });
  document.getElementById('typeFilters').innerHTML = html;
}

function setType(btn, val) {
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeType=val; applyFilters();
}
function setScore(btn, val) {
  document.querySelectorAll('[data-score]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeScore=val; applyFilters();
}
function setFlag(btn, val) {
  document.querySelectorAll('[data-flag]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeFlag=val; applyFilters();
}

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSel').value;

  filtered = ALL.filter(r => {
    if (activeType!=='all' && r.cat!==activeType) return false;
    if (activeScore==='high' && r.score<70) return false;
    if (activeScore==='mid'  && (r.score<50||r.score>=70)) return false;
    if (activeScore==='low'  && r.score>=50) return false;
    if (activeFlag!=='all'   && !(r.flags||[]).includes(activeFlag)) return false;
    if (q) {
      const hay = [r.owner,r.grantee,r.doc_num,r.legal,r.cat_label]
        .join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    switch(sort) {
      case 'score_desc': return (b.score||0)-(a.score||0);
      case 'score_asc':  return (a.score||0)-(b.score||0);
      case 'date_desc':  return (b.filed||'').localeCompare(a.filed||'');
      case 'date_asc':   return (a.filed||'').localeCompare(b.filed||'');
      case 'amount_desc':return (b.amount||0)-(a.amount||0);
      case 'owner_asc':  return (a.owner||'').localeCompare(b.owner||'');
    }
    return 0;
  });

  document.getElementById('recCount').textContent = `${filtered.length} of ${ALL.length} records`;
  renderTable();
}

function renderTable() {
  const el = document.getElementById('tableArea');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-title">No leads match your filters</div>
      <div style="color:#999;margin-top:6px">Try adjusting the filters on the left</div>
    </div>`;
    return;
  }

  const rows = filtered.map(r => {
    const sc  = r.score>=70?'score-hi':r.score>=50?'score-md':'score-lo';
    const tc  = 't-'+(r.cat||'MISC');
    const amt = r.amount ? '$'+r.amount.toLocaleString('en-US',{minimumFractionDigits:0}) : '—';
    const amtCls = r.amount>100000 ? 'amt big' : 'amt';
    const flags = (r.flags||[]).slice(0,3).map(f => {
      const hot = ['Lis pendens','Pre-foreclosure','Judgment lien','Tax lien'].includes(f);
      return `<span class="flag${hot?' hot':''}">${f}</span>`;
    }).join('');
    const viewUrl = r.owner
      ? `https://acclaimweb.horrycounty.org/AcclaimWeb/search/SearchTypeName?directName=${encodeURIComponent(r.owner)}`
      : '';

    return `<tr onclick="openModal(${r._id})">
      <td><span class="score ${sc}">${r.score||0}</span></td>
      <td><span class="type-badge ${tc}">${x(r.cat_label||r.cat||'?')}</span></td>
      <td style="font-family:monospace;font-size:11px;color:#666;white-space:nowrap">${x(r.filed||'—')}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500" title="${x(r.owner||'')}">${x(r.owner||'—')}</td>
      <td><span class="${amtCls}">${amt}</span></td>
      <td><div class="flags">${flags}</div></td>
      <td>${viewUrl?`<a class="view-link" href="${viewUrl}" target="_blank" onclick="event.stopPropagation()">View ↗</a>`:'—'}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th style="width:52px">Score</th>
          <th style="width:130px">Lead Type</th>
          <th style="width:100px">Filed Date</th>
          <th>Owner / Grantor</th>
          <th style="width:90px">Amount</th>
          <th>Flags</th>
          <th style="width:65px">Document</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function openModal(id) {
  const r = ALL.find(a=>a._id===id);
  if (!r) return;

  const scoreColor = r.score>=70?'#059669':r.score>=50?'#d97706':'#9ca3af';
  const tc = 't-'+(r.cat||'MISC');
  const amt = r.amount ? '$'+r.amount.toLocaleString('en-US') : '—';
  const flags = (r.flags||[]).map(f => {
    const hot = ['Lis pendens','Pre-foreclosure','Judgment lien','Tax lien'].includes(f);
    return `<span class="flag${hot?' hot':''}">${f}</span>`;
  }).join('');

  document.getElementById('mTitle').textContent = r.owner||'Unknown Owner';
  document.getElementById('mBadge').innerHTML =
    `<span class="type-badge ${tc}">${x(r.cat_label||r.cat||'')}</span>`;

  document.getElementById('mBody').innerHTML = `
    <div class="modal-field full">
      <label>Seller Score</label>
      <div class="score-bar">
        <span style="font-size:18px;font-weight:700;color:${scoreColor};min-width:30px">${r.score||0}</span>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${Math.min(100,r.score||0)}%;background:${scoreColor}"></div>
        </div>
      </div>
    </div>
    <div class="modal-field">
      <label>Document Number (Book/Page)</label>
      <div class="val mono">${x(r.doc_num||'—')}</div>
    </div>
    <div class="modal-field">
      <label>Filed Date</label>
      <div class="val mono">${x(r.filed||'—')}</div>
    </div>
    <div class="modal-field">
      <label>Grantor / Owner</label>
      <div class="val" style="font-weight:600">${x(r.owner||'—')}</div>
    </div>
    <div class="modal-field">
      <label>Grantee</label>
      <div class="val">${x(r.grantee||'—')}</div>
    </div>
    <div class="modal-field">
      <label>Amount / Debt Owed</label>
      <div class="val" style="font-size:18px;font-weight:700;color:#d97706">${amt}</div>
    </div>
    <div class="modal-field">
      <label>Lead Type</label>
      <div class="val">${x(r.cat_label||r.cat||'—')}</div>
    </div>
    <div class="modal-field full">
      <label>Legal Description / Comments</label>
      <div class="val mono" style="font-size:11px;color:#555">${x(r.legal||'—')}</div>
    </div>
    <div class="modal-field full">
      <label>Motivated Seller Flags</label>
      <div class="flags" style="margin-top:4px">${flags||'<span style="color:#999;font-size:12px">None</span>'}</div>
    </div>
    <div class="modal-field full">
      <label>How to Find This Record</label>
      <div class="val" style="font-size:12px;color:#555;line-height:1.6">
        1. Go to <strong>acclaimweb.horrycounty.org</strong><br>
        2. Click <strong>Official Records → Book/Page</strong><br>
        3. Enter Book: <strong>${x((r.doc_num||'').split('/')[0]||'')}</strong> and Page: <strong>${x((r.doc_num||'').split('/')[1]||'')}</strong><br>
        4. Click Search
      </div>
    </div>
  `;

  const viewUrl = r.owner
    ? `https://acclaimweb.horrycounty.org/AcclaimWeb/search/SearchTypeName?directName=${encodeURIComponent(r.owner)}`
    : '';

  document.getElementById('mFoot').innerHTML = `
    ${viewUrl ? `<a href="${viewUrl}" target="_blank"><button class="btn-sec">🔍 Search Owner in Acclaim</button></a>` : ''}
    <button class="btn-sec" onclick="copySingle(${r._id})">📋 Copy Row</button>
    <button class="btn-sec" onclick="closeModal()">Close</button>
  `;

  document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function exportCSV() {
  const cols = ['First Name','Last Name','Mailing Address','Mailing City','Mailing State','Mailing Zip',
    'Property Address','Property City','Property State','Property Zip',
    'Lead Type','Document Type','Date Filed','Document Number','Amount/Debt Owed',
    'Seller Score','Motivated Seller Flags','Source','Public Records URL'];
  const rows = [cols.join(',')];
  filtered.forEach(r => {
    const owner = r.owner||'';
    const parts = owner.split(' ');
    rows.push([
      csv(parts[0]||''), csv(parts.slice(1).join(' ')||''),
      csv(r.mail_address||''), csv(r.mail_city||''), csv(r.mail_state||'SC'), csv(r.mail_zip||''),
      csv(r.prop_address||''), csv(r.prop_city||''), csv(r.prop_state||'SC'), csv(r.prop_zip||''),
      csv(r.cat_label||''), csv(r.cat||''),
      csv(r.filed||''), csv(r.doc_num||''),
      r.amount||'', r.score||0,
      csv((r.flags||[]).join('; ')),
      csv('Horry County Register of Deeds'),
      csv(r.owner ? `https://acclaimweb.horrycounty.org/AcclaimWeb/search/SearchTypeName?directName=${encodeURIComponent(r.owner)}` : ''),
    ].join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `horry_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function copySingle(id) {
  const r = ALL.find(a=>a._id===id);
  if (!r) return;
  const owner = r.owner||'';
  const parts = owner.split(' ');
  const row = [parts[0]||'', parts.slice(1).join(' ')||'',
    r.mail_address||'', r.mail_city||'', r.mail_state||'SC', r.mail_zip||'',
    r.prop_address||'', r.prop_city||'', r.prop_state||'SC', r.prop_zip||'',
    r.cat_label||'', r.cat||'', r.filed||'', r.doc_num||'',
    r.amount||'', r.score||0, (r.flags||[]).join('; '),
    'Horry County Register of Deeds',
    r.owner ? `https://acclaimweb.horrycounty.org/AcclaimWeb/search/SearchTypeName?directName=${encodeURIComponent(r.owner)}` : ''
  ].join('\t');
  navigator.clipboard.writeText(row).then(() => alert('Copied!'));
}

function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function csv(s) {
  s = String(s||'');
  return (s.includes(',')||s.includes('"')||s.includes('\n')) ? '"'+s.replace(/"/g,'""')+'"' : s;
}

loadData();
</script>
